<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="sealGrad" cx="35%" cy="28%" r="80%">
      <stop offset="0%" stop-color="#c9392a"/>
      <stop offset="55%" stop-color="#b3231c"/>
      <stop offset="100%" stop-color="#7a1712"/>
    </radialGradient>
  </defs>

  <!-- hand-stamped ink seal, slightly irregular like a real dojang impression -->
  <path
    fill="url(#sealGrad)"
    d="M60,32
       C59.82,25.70 55.05,18.45 50.38,13.62
       C45.71,8.79 38.25,3.12 32,3
       C25.75,2.88 17.58,8.08 12.91,12.91
       C8.24,17.74 3.94,25.70 4,32
       C4.06,38.30 8.59,45.82 13.26,50.74
       C17.93,55.66 25.64,61.38 32,61.5
       C38.37,61.62 46.78,56.37 51.45,51.45
       C56.12,46.53 60.18,38.31 60,32
       Z"
  />

  <!-- inner border ring, echoes the seal-ring mark used in the results stamp -->
  <circle cx="32" cy="32" r="24.5" fill="none" stroke="#f3ede0" stroke-opacity="0.5" stroke-width="1.8"/>

  <!-- carved "人" mark: the person whose name is being read -->
  <path d="M32,19 Q23,31 15,47" fill="none" stroke="#f3ede0" stroke-width="7.5" stroke-linecap="round"/>
  <path d="M34,19 L49,47" fill="none" stroke="#f3ede0" stroke-width="7.5" stroke-linecap="round"/>
</svg>
